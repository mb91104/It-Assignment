<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-top">
      <h1>IPL 2026</h1>
    </div>
    <nav id="main-nav">
      <a href="index.html">Home</a>
      <a href="login.html" class="active">Login</a>
      <a href="register.html">Register</a>
    </nav>
  </header>

  <main>
    <div class="card form-card">
      <h2 style="margin-bottom: 1.5rem; text-align: center;">Welcome Back</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" required placeholder="Enter your username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
      </form>
      <p id="error-msg" class="error-msg"></p>
      <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
        Don't have an account? <a href="register.html" style="color: var(--accent-blue); text-decoration: none;">Register here</a>
      </p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 IPL Stats Tracker. All rights reserved.</p>
  </footer>

  <script src="js/auth.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          setAuthToken(data.token, data.username);
          window.location.href = 'dashboard.html';
        } else {
          errorMsg.textContent = data.error || 'Login failed';
        }
      } catch (err) {
        errorMsg.textContent = 'An error occurred. Please try again.';
      }
    });
  </script>
</body>
</html>
