<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>IPL 2026 Season Tracker</h1>
  </header>
  
  <nav id="main-nav">
    <a href="login.html" class="active" id="login-link">Login</a>
    <a href="register.html" id="register-link">Register</a>
  </nav>

  <main>
    <h2>Login</h2>
    <div class="card" style="max-width: 400px; margin: 0 auto;">
      <form id="login-form">
        <div style="margin-bottom: 1rem;">
          <label for="username" style="display: block; margin-bottom: 0.5rem;">Username:</label>
          <input type="text" id="username" required style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;">
        </div>
        <div style="margin-bottom: 1rem;">
          <label for="password" style="display: block; margin-bottom: 0.5rem;">Password:</label>
          <input type="password" id="password" required style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;">
        </div>
        <button type="submit" style="background: #1a237e; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; cursor: pointer; width: 100%;">Login</button>
      </form>
      <p id="error-msg" style="color: red; margin-top: 1rem;"></p>
      <p style="margin-top: 1rem;">Don't have an account? <a href="register.html">Register here</a></p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 IPL Stats Tracker. All rights reserved.</p>
  </footer>

  <script src="js/auth.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          setAuthToken(data.token, data.username);
          window.location.href = 'dashboard.html';
        } else {
          errorMsg.textContent = data.error || 'Login failed';
        }
      } catch (err) {
        errorMsg.textContent = 'An error occurred. Please try again.';
      }
    });
  </script>
</body>
</html>
