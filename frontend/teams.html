<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 - Teams</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-top">
      <h1>IPL 2026</h1>
      <a href="#" id="logout-link" class="btn" style="color: var(--text-muted); font-size: 0.8rem; padding: 0;">Logout</a>
    </div>
    <nav id="main-nav">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="teams.html" class="active">Teams</a>
      <a href="players.html">Players</a>
    </nav>
  </header>

  <main>
    <h2 style="margin-bottom: 2rem;">Points Table</h2>
    <div style="overflow-x: auto;">
      <table id="teams-table" class="stats-table">
        <thead>
          <tr>
            <th>Pos</th>
            <th>Team</th>
            <th>P</th>
            <th>W</th>
            <th>L</th>
            <th>NRR</th>
            <th>Pts</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="7" style="text-align: center; padding: 2rem; color: var(--text-muted);">Loading standings...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 IPL Stats Tracker. All rights reserved.</p>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/teams.js"></script>
  <script>
    document.getElementById('logout-link').addEventListener('click', (e) => {
      e.preventDefault();
      logout();
    });
  </script>
</body>
</html>
