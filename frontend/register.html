<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 - Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-top">
      <h1>IPL 2026</h1>
    </div>
    <nav id="main-nav">
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="register.html" class="active">Register</a>
    </nav>
  </header>

  <main>
    <div class="card form-card">
      <h2 style="margin-bottom: 1.5rem; text-align: center;">Join the Action</h2>
      <form id="register-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" required placeholder="Choose a username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Create a password">
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" required placeholder="Confirm your password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
      </form>
      <p id="error-msg" class="error-msg"></p>
      <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
        Already have an account? <a href="login.html" style="color: var(--accent-blue); text-decoration: none;">Login here</a>
      </p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 IPL Stats Tracker. All rights reserved.</p>
  </footer>

  <script src="js/auth.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const errorMsg = document.getElementById('error-msg');

      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match';
        return;
      }

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          alert('Registration successful! Please login.');
          window.location.href = 'login.html';
        } else {
          errorMsg.textContent = data.error || 'Registration failed';
        }
      } catch (err) {
        errorMsg.textContent = 'An error occurred. Please try again.';
      }
    });
  </script>
</body>
</html>
