<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 - Compare Players</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1.5rem;
      align-items: start;
      margin-top: 1rem;
    }
    .vs-divider {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding-top: 8rem;
    }
    .vs-circle {
      width: 40px;
      height: 40px;
      background: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: var(--text-muted);
      font-size: 0.8rem;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }
    .select-wrapper {
      position: relative;
      margin-bottom: 1rem;
    }
    .select-box {
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: 10px;
      appearance: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .select-box:focus {
      border-color: var(--accent-blue);
      outline: none;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }
    .compare-card {
      min-height: 280px;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
      border-top: 4px solid transparent;
    }
    .compare-card.active-p1 { border-top-color: #00FFFF; }
    .compare-card.active-p2 { border-top-color: #A855F7; }
    
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.85rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .stat-label {
      color: var(--text-muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat-value {
      font-weight: 800;
      font-size: 1rem;
    }
    .winner {
      color: var(--accent-gold);
      position: relative;
    }
    .winner::after {
      content: '▲';
      font-size: 0.6rem;
      margin-left: 4px;
      vertical-align: middle;
    }
    
    #radar-section {
      margin-top: 2rem;
      position: relative;
    }
    .radar-wrapper {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      aspect-ratio: 1/1;
    }

    @media (max-width: 850px) {
      .compare-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      .vs-divider {
        padding: 0.5rem 0;
        flex-direction: row;
      }
      .vs-line { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <h1>IPL 2026</h1>
    </div>
    <nav id="main-nav">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="compare.html" class="active">Compare</a>
    </nav>
  </header>

  <main>
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem;">
      <div>
        <h2 style="font-size: 1.75rem; font-weight: 800;">Battle of the Best</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Compare player performance and tactical attributes.</p>
      </div>
      <button onclick="window.location.reload()" class="btn" style="padding: 0.5rem; color: var(--text-muted); font-size: 0.75rem;">Reset All</button>
    </div>

    <div class="compare-grid">
      <!-- Player 1 -->
      <div class="compare-column">
        <div class="select-wrapper">
          <select id="player1-select" class="select-box">
            <option value="">Choose Player A</option>
          </select>
        </div>
        <div id="player1-card" class="card compare-card">
          <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0.3;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <p style="margin-top: 1rem; font-size: 0.8rem; font-weight: 600;">Awaiting selection...</p>
          </div>
        </div>
      </div>

      <!-- VS Divider -->
      <div class="vs-divider">
        <div style="width: 1px; height: 100px; background: linear-gradient(to bottom, transparent, var(--border-color)); margin-bottom: 1rem;" class="vs-line"></div>
        <div class="vs-circle">VS</div>
        <div style="width: 1px; height: 100px; background: linear-gradient(to top, transparent, var(--border-color)); margin-top: 1rem;" class="vs-line"></div>
      </div>

      <!-- Player 2 -->
      <div class="compare-column">
        <div class="select-wrapper">
          <select id="player2-select" class="select-box">
            <option value="">Choose Player B</option>
          </select>
        </div>
        <div id="player2-card" class="card compare-card">
          <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0.3;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <p style="margin-top: 1rem; font-size: 0.8rem; font-weight: 600;">Awaiting selection...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Radar Chart Section -->
    <section id="radar-section">
      <div class="card" style="padding: 2rem;">
        <h3 style="text-align: center; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 2rem;">Tactical Comparison</h3>
        <div id="radar-container" class="radar-wrapper" style="display: flex; justify-content: center; align-items: center;">
          <p style="color: var(--text-muted); font-size: 0.85rem; text-align: center; max-width: 200px;">Select two players of the same type to visualize attributes</p>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 IPL Stats Tracker. All rights reserved.</p>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/radar.js"></script>
  <script src="js/compare.js"></script>
</body>
</html>
